<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural Island Generator</title>
  </head>
  <body>
    <div id="app">
      <nav class="mode-toolbar" aria-label="Scene mode">
        <button class="mode-tool is-active" type="button" data-mode="pan" aria-pressed="true" title="Pan and orbit the 3D scene">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.5 11V6.5a1.5 1.5 0 0 1 3 0V10m0 0V4.5a1.5 1.5 0 0 1 3 0V10m0 .5V6a1.5 1.5 0 0 1 3 0v6m0-1V8.5a1.5 1.5 0 0 1 3 0v5.2c0 4.3-2.8 7.3-7.1 7.3h-.8a7 7 0 0 1-5-2.1L3.9 15a1.7 1.7 0 0 1 2.4-2.4l2.2 2.1V11Z"/></svg>
          <span>Pan</span>
        </button>
        <button class="mode-tool" type="button" data-mode="island" aria-pressed="false" title="Draw a new island outline">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 16.5c1.7-1.8 2.7-4.6 5.2-5.1 2.2-.4 3.1 1.5 5.2.9 2.4-.6 3.3-3.3 5.6-4.8"/><path d="m17.5 4 3.5 3.5-9.8 9.8-4.7 1.2 1.2-4.7L17.5 4Z"/><path d="M3 21h18"/></svg>
          <span>Island</span>
        </button>
        <button class="mode-tool" type="button" data-mode="build" aria-pressed="false" title="Place buildings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 10 9-7 9 7v10a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V10Z"/><path d="M18 3v5"/></svg>
          <span>Build</span>
        </button>
        <button class="mode-tool" type="button" data-mode="edit" aria-pressed="false" title="Select and edit buildings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 15-1 6 6-1L20 9l-5-5L4 15Z"/><path d="m13 6 5 5M9 20h12"/></svg>
          <span>Edit</span>
        </button>
        <button class="mode-tool" type="button" data-mode="path" aria-pressed="false" title="Generate and inspect pathways">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="18" r="2"/><circle cx="18" cy="6" r="2"/><path d="M7.5 16.5c1.4-1.5 1.7-3.2.8-4.7C7.2 10 8.8 8 11 9c2.7 1.3 4.4-.2 5.5-1.5"/></svg>
          <span>Paths</span>
        </button>
        <button class="mode-tool" type="button" data-mode="simulate" aria-pressed="false" title="Run simulation view">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 9 6-9 6V6Z"/></svg>
          <span>Simulate</span>
        </button>
      </nav>
      <section class="simulation-hud" aria-live="polite" hidden>
        <span class="simulation-hud__date">July 1</span>
        <time class="simulation-hud__clock">8:00 AM</time>
        <button class="simulation-hud__speed" type="button" aria-label="Simulation speed">1×</button>
      </section>
      <section class="simulation-worker-panel" aria-live="polite" hidden>
        <strong class="simulation-worker-panel__summary">0 workers · none selected</strong>
        <span class="simulation-worker-panel__detail">Click a worker or drag a box to select</span>
      </section>
      <section class="simulation-building-panel" aria-live="polite" hidden>
        <strong class="simulation-building-panel__title">Town production</strong>
        <span class="simulation-building-panel__status">Click a building to inspect it</span>
        <div class="simulation-building-panel__progress" aria-hidden="true">
          <span class="simulation-building-panel__progress-fill"></span>
        </div>
        <span class="simulation-building-panel__detail"></span>
        <span class="simulation-building-panel__metrics"></span>
      </section>
      <div class="simulation-notice" role="status" hidden></div>
      <div class="selection-marquee" hidden></div>
      <div class="day-modal" role="dialog" aria-modal="true" aria-labelledby="day-modal-title" hidden>
        <div class="day-modal__panel">
          <h2 id="day-modal-title">Today's progress</h2>
          <p class="day-modal__summary"></p>
          <button class="day-modal__button" type="button">OK</button>
        </div>
      </div>
      <canvas id="scene"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
